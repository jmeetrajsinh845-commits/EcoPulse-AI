name: Flatten Repository Structure

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Move files from nested folder to root
        run: |
          echo "=== Current root structure ==="
          ls -la

          if [ -d "EcoPulse-AI/EcoPulse-AI" ]; then
            echo "Found nested folder: EcoPulse-AI/EcoPulse-AI"

            shopt -s dotglob
            mv EcoPulse-AI/EcoPulse-AI/* ./
            
            echo "=== Files moved successfully ==="
            ls -la

          else
            echo "ERROR: Nested folder EcoPulse-AI/EcoPulse-AI not found."
            echo "Current structure:"
            find . -not -path './.git/*' | sort
            exit 1
          fi

      - name: Delete the empty EcoPulse-AI folder
        run: |
          rm -rf EcoPulse-AI
          echo "=== Deleted EcoPulse-AI folder ==="

      - name: Verify OpenEnv required files at root
        run: |
          echo "=== Verifying required files ==="
          for file in openenv.yaml inference.py env.py Dockerfile; do
            if [ -f "$file" ]; then
              echo "✅ $file is at root"
            else
              echo "⚠️  $file NOT found at root"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "fix: flatten nested folder structure for OpenEnv validation"
          git push origin main
          echo "✅ Changes committed and pushed to main."
