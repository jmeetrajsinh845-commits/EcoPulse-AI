name: Flatten Repository Structure
on:
  workflow_dispatch:
jobs:
  flatten:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Auto-find and move files to root
        run: |
          # આ કમાન્ડ આપોઆપ openenv.yaml શોધશે અને તેની બધી ફાઈલો બહાર લાવશે
          TARGET_DIR=$(find . -name "openenv.yaml" -exec dirname {} \;)
          echo "Found openenv.yaml in: $TARGET_DIR"
          
          if [ "$TARGET_DIR" = "." ]; then
            echo "Files are already at root."
            exit 0
          fi
          
          shopt -s dotglob
          mv $TARGET_DIR/* ./
          echo "Files moved to root successfully."
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "fix: automatic flatten to root"
          git push origin main
